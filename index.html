<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>今天吃什么</title>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        width: 100%;
        overflow-x: hidden;
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        background:
            linear-gradient(135deg, #ffe3f0 0%, #ffb6d5 22%, #f0b9e6 40%, #b9c8ff 60%, #aed6ff 80%, #ffe3f0 100%);
        background-attachment: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #3a3a5a;
        padding: 18px;
    }

    .app {
        width: min(1120px, 100%);
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 24px;
        align-items: center;
    }

    .wheel-card, .side-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        border: 2px solid rgba(255, 255, 255, 0.9);
        border-radius: 28px;
        box-shadow: 0 20px 60px rgba(233, 64, 145, 0.18), 0 4px 16px rgba(77, 141, 255, 0.16);
        padding: 24px;
    }

    .title {
        margin: 0 0 8px;
        text-align: center;
        font-size: clamp(32px, 5vw, 56px);
        font-weight: 900;
        color: #e84393;
        letter-spacing: 2px;
        text-shadow: 0 4px 0 rgba(255, 255, 255, 0.9);
    }

    .subtitle {
        text-align: center;
        margin: 0 0 20px;
        font-size: 16px;
        color: #4d8dff;
    }

    .wheel-wrap {
        position: relative;
        width: min(100%, 560px);
        aspect-ratio: 1 / 1;
        margin: 0 auto;
    }

    canvas {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        filter: drop-shadow(0 18px 24px rgba(120, 90, 200, 0.22));
        transform: rotate(0deg);
    }

    .pointer {
        position: absolute;
        top: -9px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 22px solid transparent;
        border-right: 22px solid transparent;
        border-top: 42px solid #ff5fa2;
        z-index: 10;
        filter: drop-shadow(0 4px 3px rgba(0,0,0,0.22));
    }

    .center-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 132px;
        height: 132px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffffff, #cfe0ff);
        border: 7px solid #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        box-shadow: 0 8px 18px rgba(120, 90, 200, 0.25);
        z-index: 8;
        user-select: none;
        overflow: hidden;
        padding: 4px;
    }

    #centerSticker {
        width: 122px;
        height: 122px;
        object-fit: contain;
        display: block;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
    }

    .controls {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 20px;
    }

    button {
        border: none;
        cursor: pointer;
        border-radius: 999px;
        padding: 14px 28px;
        font-size: 18px;
        font-weight: 800;
        color: #fff;
        background: linear-gradient(135deg, #ff6fb0, #6aa8ff);
        box-shadow: 0 10px 24px rgba(120, 120, 220, 0.32);
        transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover {
        transform: translateY(-2px);
        filter: brightness(1.04);
    }

    button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .small-btn {
        background: linear-gradient(135deg, #ff8fc0, #8db8ff);
        font-size: 15px;
        padding: 12px 22px;
    }

    .result-title {
        margin: 0 0 12px;
        font-size: 22px;
        color: #e84393;
    }

    .result-box {
        min-height: 140px;
        border-radius: 22px;
        background: linear-gradient(145deg, #ffe3f1, #dce8ff);
        border: 2px dashed rgba(110, 140, 240, 0.5);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 18px;
        margin-bottom: 18px;
    }

    .result-label {
        font-size: 15px;
        color: #6aa0ff;
        margin-bottom: 8px;
    }

    #result {
        font-size: clamp(34px, 6vw, 54px);
        font-weight: 900;
        color: #e84393;
        line-height: 1.15;
    }

    .history {
        margin: 0 0 18px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.55);
    }

    .history strong {
        color: #e84393;
    }

    #historyText {
        color: #5b7fd6;
        line-height: 1.7;
        word-break: break-all;
    }

    .items-title {
        margin: 8px 0 10px;
        color: #e84393;
        font-weight: 900;
    }

    .items {
        max-height: 260px;
        overflow-y: auto;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding-right: 4px;
    }

    .tag {
        display: inline-block;
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(110, 140, 240, 0.35);
        color: #c2398a;
        font-size: 14px;
    }

    .tip {
        margin-top: 16px;
        font-size: 13px;
        color: #6aa0ff;
        line-height: 1.6;
    }

    @media (max-width: 900px) {
        .app {
            grid-template-columns: 1fr;
        }

        .wheel-card, .side-card {
            padding: 18px;
        }

        .side-card {
            order: 2;
        }

        .wheel-card {
            order: 1;
        }

        .wheel-wrap {
            width: 100%;
            max-width: 520px;
        }
    }
</style>
</head>

            <div class="controls">
                <button id="spinBtn">开始转盘</button>
                <button class="small-btn" id="quickBtn">直接随机</button>
            </div>
        </section>

        <aside class="side-card">
            <h2 class="result-title">抽选结果</h2>
            <div class="result-box">
                <div class="result-label">今天就吃：</div>
                <div id="result">还没开始</div>
            </div>

            <div class="history">
                <strong>最近抽到：</strong>
                <div id="historyText">暂无</div>
            </div>

            <div class="items-title">转盘选项（共 <span id="count"></span> 个）</div>
            <div class="items" id="items"></div>
        </aside>
    </main>

<script>
const items = [
  "塔斯汀",
  "麦当劳",
  "肯德基",
  "麻辣烫",
  "螺蛳粉",
  "烤鸭",
  "窑鸡",
  "米线",
  "卤味鸭货",
  "披萨",
  "粉",
  "面",
  "炸鸡",
  "巴斯克",
  "火鸡面",
  "麻辣拌",
  "烤鸡腿",
  "烤冷面",
  "大饼卷肉",
  "淮南牛肉汤",
  "蛋包饭",
  "咖喱饭",
  "寿司",
  "冒菜",
  "麻辣香锅",
  "石锅拌饭",
  "饺子",
  "馄饨",
  "拉肉拌面",
  "黄焖鸡",
  "自选菜",
  "不吃",
  "奶茶",
  "小蛋糕",
  "土豆粉",
  "酸辣粉",
  "凉菜",
  "菜煎饼",
  "鸡蛋灌饼",
  "煎饼果子",
  "猪脚饭",
  "鸭腿饭",
  "凉皮",
  "重庆小面",
  "花甲粉",
  "水果捞",
  "新疆炒米粉",
  "手抓饭",
  "肉夹馍",
  "烤鱼",
  "小笼包",
  "关东煮"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const quickBtn = document.getElementById("quickBtn");
const resultEl = document.getElementById("result");
const historyText = document.getElementById("historyText");
const itemsBox = document.getElementById("items");
const countEl = document.getElementById("count");

let currentRotation = 0;
let isSpinning = false;
let history = [];

countEl.textContent = items.length;
itemsBox.innerHTML = items.map(item => `<span class="tag">${item}</span>`).join("");

const colors = [
    "#ff9ec7", "#a8c8ff", "#ffc1de", "#bcd4ff", "#ff8fb8", "#9bbcff",
    "#ffb3d4", "#cfddff", "#ffa6cc", "#aecbff", "#ffc8e0", "#c3d6ff"
];

function drawWheel(rotation = 0) {
    const size = canvas.width;
    const cx = size / 2;
    const cy = size / 2;
    const radius = size * 0.47;
    const innerRadius = size * 0.075;
    const slice = (Math.PI * 2) / items.length;

    ctx.clearRect(0, 0, size, size);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);

    for (let i = 0; i < items.length; i++) {
        const start = i * slice;
        const end = start + slice;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.72)";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.save();
        ctx.rotate(start + slice / 2);
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#2e4a8a";
        ctx.font = "bold 25px Microsoft YaHei, PingFang SC, Arial";

        const label = items[i];
        const maxLen = 5;
        const text = label.length > maxLen ? label.slice(0, maxLen) + "…" : label;
        ctx.fillText(text, radius - 22, 0);
        ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(0, 0, innerRadius, 0, Math.PI * 2);
    ctx.fillStyle = "#fff0f5";
    ctx.fill();

    ctx.restore();
}

function normalizeAngle(angle) {
    angle = angle % (Math.PI * 2);
    return angle < 0 ? angle + Math.PI * 2 : angle;
}

function getSelectedIndex(rotation) {
    const slice = (Math.PI * 2) / items.length;
    const pointerAngle = -Math.PI / 2;
    const wheelAngleAtPointer = normalizeAngle(pointerAngle - rotation);
    return Math.floor(wheelAngleAtPointer / slice);
}

function updateHistory(item) {
    history.unshift(item);
    history = history.slice(0, 6);
    historyText.textContent = history.join("、");
}

function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
}

function spin() {
    if (isSpinning) return;
    isSpinning = true;
    spinBtn.disabled = true;
    quickBtn.disabled = true;
    resultEl.textContent = "转动中…";

    const startRotation = currentRotation;
    const randomExtra = Math.random() * Math.PI * 2;
    const totalRotation = Math.PI * 2 * (7 + Math.floor(Math.random() * 4)) + randomExtra;
    const endRotation = startRotation + totalRotation;
    const duration = 4300;
    const startTime = performance.now();

    function animate(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = easeOutCubic(progress);
        currentRotation = startRotation + totalRotation * eased;
        drawWheel(currentRotation);

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            currentRotation = endRotation;
            drawWheel(currentRotation);
            const selected = items[getSelectedIndex(currentRotation)];
            resultEl.textContent = selected;
            updateHistory(selected);
            isSpinning = false;
            spinBtn.disabled = false;
            quickBtn.disabled = false;
        }
    }

    requestAnimationFrame(animate);
}

function quickRandom() {
    if (isSpinning) return;
    const selected = items[Math.floor(Math.random() * items.length)];
    resultEl.textContent = selected;
    updateHistory(selected);
}

drawWheel(currentRotation);
spinBtn.addEventListener("click", spin);
quickBtn.addEventListener("click", quickRandom);
</script>
